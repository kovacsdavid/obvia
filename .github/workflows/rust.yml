name: Rust

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: |
        cd backend
        cargo build --verbose
    - name: Run fmt
      run: |
        cd backend
        cargo fmt --check --verbose
    - name: Run clippy
      run: |
        cd backend
        cargo clippy -- -D warnings --verbose
    - name: Run tests
      run: |
        cd backend
        cargo test --verbose
