name: Rust

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/rust.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Build
      run: |
        cd backend
        cargo build --verbose
    - name: Run fmt
      run: |
        cd backend
        cargo fmt --check --verbose
    - name: Run clippy
      run: |
        cd backend
        cargo clippy -- -D warnings --verbose
    - name: Install Typst
      run: |
        set -euo pipefail

        TYPST_VERSION="0.15.1"
        TYPST_ARCHIVE="typst-x86_64-unknown-linux-musl.tar.xz"
        TYPST_URL="https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/${TYPST_ARCHIVE}"
        TYPST_SHA256="a6d077d0a95eed5a2eba715b2dae06be954f624ccbf85758a03f389ded33118c"

        curl -L "$TYPST_URL" -o "$TYPST_ARCHIVE"
        echo "${TYPST_SHA256}  ${TYPST_ARCHIVE}" | sha256sum -c -

        mkdir typst-bin
        tar -xf "$TYPST_ARCHIVE" -C typst-bin --strip-components=1
        sudo mv typst-bin/typst /usr/local/bin/typst
        typst --version
    - name: Run tests
      run: |
        cd backend
        cargo test -r --verbose
